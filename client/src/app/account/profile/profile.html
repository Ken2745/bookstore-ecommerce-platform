<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-sm profile-card">
        <div class="card-body text-center">

          <!-- Avatar -->
          <div class="profile-avatar mb-3">
            <i class="fa fa-user-circle fa-5x"></i>
          </div>

          <!-- Username -->
          <h3 class="profile-username">
            {{ (accountService.currentUser$ | async)?.username }}
          </h3>

          <p class="text">Manga Store Member</p>

          <hr>

          <!-- Account Info -->
          <div class="text-start profile-info">
            <p><strong>Username:</strong> {{ (accountService.currentUser$ | async)?.username }}</p>
            <p><strong>Status:</strong> Active</p>
            <p><strong>Member Since:</strong> 2026</p>
          </div>

          <hr>

          <!-- Buttons -->
          <div class="d-grid gap-2">
            <button class="btn btn-primary">
              <i class="fa fa-shopping-bag"></i> View Orders
            </button>

            <button class="btn btn-outline-secondary">
              <i class="fa fa-cog"></i> Account Settings
            </button>

            <button class="btn btn-danger" (click)="accountService.logout()">
              <i class="fa fa-sign-out"></i> Log Out
            </button>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
